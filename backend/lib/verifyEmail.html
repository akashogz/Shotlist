<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Your Account | Shotlist</title>
    <style>
        :root {
            --primary: #464E82;
            --bg: #303030; 
            --surface: #202020;
            --text: #FFFFFF;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #303030;
            color: #FFFFFF;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .card {
            background: #202020;
            padding: 3rem;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            max-width: 400px;
            width: 90%;
            border: 1px solid #333;
        }

        .logo {
          width: 250px;
          margin-bottom: 1rem;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            font-weight: 600;
        }

        p {
            color: #A0A0A0;
            line-height: 1.6;
            margin-bottom: 2.5rem;
        }

        .btn {
            display: inline-block;
            background: #464E82;
            color: #FFFFFF;
            text-decoration: none;
            padding: 1rem 2.5rem;
            border-radius: 6px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(70, 78, 130, 0.4);
        }

        .footer {
            margin-top: 2rem;
            font-size: 0.75rem;
            color: #555;
        }
    </style>
</head>
<body>

    <div class="card">
        <img class="logo" src="https://i.ibb.co/FbXTK0CZ/Untitled-design-removebg-preview.png" alt="Shotlist Logo"/>
        <h1>Welcome to Shotlist</h1>
        <p>You're one step away from tracking movies, writing reviews, and building your personal watchlist.</p>
        
        <a href="{{verification_url}}" class="btn">Verify Account</a>

        <div class="footer">
            If you didn't sign up for Shotlist, you can safely ignore this.
        </div>
    </div>

</body>
</html>
